<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DI Team Tasks</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 20px; color: #e94560; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab { padding: 12px 20px; background: #16213e; border: none; color: #eee; cursor: pointer; border-radius: 8px; }
        .tab.active { background: #e94560; }
        
        .panel { display: none; }
        .panel.active { display: block; }
        
        .card { background: #16213e; padding: 20px; border-radius: 12px; margin-bottom: 16px; }
        
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 12px; background: #0f3460; border: 1px solid #533483; color: #eee; border-radius: 8px; }
        button { padding: 12px 20px; background: #e94560; border: none; color: white; cursor: pointer; border-radius: 8px; }
        button:hover { background: #ff6b6b; }
        
        .task { background: #0f3460; padding: 16px; margin-bottom: 10px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .task-info { flex: 1; min-width: 200px; }
        .task-info h4 { margin-bottom: 4px; }
        .task-info p { font-size: 13px; color: #aaa; }
        .task-meta { display: flex; gap: 8px; align-items: center; }
        .tag { padding: 4px 8px; border-radius: 4px; font-size: 11px; text-transform: uppercase; }
        .tag.high { background: #e94560; }
        .tag.medium { background: #f39c12; }
        .tag.low { background: #27ae60; }
        .tag.overdue { background: #c0392b; }
        
        .user-chip { display: inline-block; padding: 6px 12px; background: #e94560; border-radius: 20px; margin: 4px; font-size: 13px; }
        
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .stat-card { background: #16213e; padding: 16px; border-radius: 10px; text-align: center; }
        .stat-card .number { font-size: 28px; color: #e94560; }
        
        .filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .filter-btn { padding: 8px 14px; background: #16213e; border: none; color: #eee; cursor: pointer; border-radius: 6px; }
        .filter-btn.active { background: #e94560; }
        
        .delete-btn { background: #c0392b; padding: 8px 12px; }
        
        .share-box { background: #16213e; padding: 16px; border-radius: 10px; margin-top: 20px; }
        .share-box textarea { width: 100%; height: 100px; font-family: monospace; font-size: 12px; }
        
        @media (max-width: 500px) {
            .task { flex-direction: column; }
            .task-meta { width: 100%; justify-content: flex-end; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 DI Team Tasks</h1>
        
        <div class="stats">
            <div class="stat-card"><div class="number" id="totalTasks">0</div><div>Total</div></div>
            <div class="stat-card"><div class="number" id="completedTasks">0</div><div>Done</div></div>
            <div class="stat-card"><div class="number" id="overdueTasks">0</div><div>Overdue</div></div>
            <div class="stat-card"><div class="number" id="teamMembers">0</div><div>Team</div></div>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="showPanel('tasks')">Tasks</button>
            <button class="tab" onclick="showPanel('add')">Add</button>
            <button class="tab" onclick="showPanel('team')">Team</button>
            <button class="tab" onclick="showPanel('share')">Share</button>
        </div>
        
        <div id="tasks" class="panel active">
            <div class="filters">
                <button class="filter-btn active" onclick="filterTasks('all')">All</button>
                <button class="filter-btn" onclick="filterTasks('pending')">Pending</button>
                <button class="filter-btn" onclick="filterTasks('completed')">Done</button>
                <button class="filter-btn" onclick="filterTasks('overdue')">Overdue</button>
            </div>
            <div id="taskList"></div>
        </div>
        
        <div id="add" class="panel">
            <div class="card">
                <h3 style="margin-bottom:16px;color:#e94560">New Task</h3>
                <input type="text" id="taskTitle" placeholder="Task title *">
                <textarea id="taskDesc" placeholder="Description" rows="2"></textarea>
                <select id="taskAssignee"><option value="">Assign to...</option></select>
                <input type="date" id="taskDeadline">
                <select id="taskPriority">
                    <option value="low">Low</option>
                    <option value="medium" selected>Medium</option>
                    <option value="high">High</option>
                </select>
                <button onclick="addTask()">Add Task</button>
            </div>
        </div>
        
        <div id="team" class="panel">
            <div class="card">
                <h3 style="margin-bottom:16px;color:#e94560">Add Member</h3>
                <input type="text" id="newMemberName" placeholder="Name">
                <input type="text" id="newMemberRole" placeholder="Role">
                <button onclick="addMember()">Add</button>
            </div>
            <div class="card">
                <h3 style="margin-bottom:16px;color:#e94560">Team</h3>
                <div id="teamList"></div>
            </div>
        </div>
        
        <div id="share" class="panel">
            <div class="share-box">
                <h3 style="margin-bottom:12px;color:#e94560">Share Tasks</h3>
                <p style="margin-bottom:12px;color:#aaa;font-size:13px">Copy the code below and send to your team. They paste it here to sync.</p>
                <textarea id="shareData" readonly></textarea>
                <button onclick="copyShare()" style="margin-top:10px">Copy</button>
                <button onclick="document.getElementById('importData').style.display='block'" style="margin-top:10px;background:#533483">Paste & Import</button>
            </div>
            <div class="share-box" id="importData" style="display:none">
                <h3 style="margin-bottom:12px;color:#e94560">Import</h3>
                <textarea id="importText" placeholder="Paste code here..."></textarea>
                <button onclick="importData()">Import</button>
            </div>
        </div>
    </div>
    
    <script>
        let data = JSON.parse(localStorage.getItem('diTasks')) || {
            tasks: [],
            members: [
                { id: 1, name: 'Sansar', role: 'Leader' },
                { id: 2, name: 'Addu', role: 'Builder' },
                { id: 3, name: 'Yusuf', role: 'Builder' },
                { id: 4, name: 'Kian', role: 'Performer' },
                { id: 5, name: 'Saaransh', role: 'Performer' },
                { id: 6, name: 'Sudhanva', role: 'Builder' }
            ]
        };
        
        let currentFilter = 'all';
        
        function save() {
            localStorage.setItem('diTasks', JSON.stringify(data));
            render();
        }
        
        function showPanel(id) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.target.classList.add('active');
            if (id === 'share') updateShare();
        }
        
        function filterTasks(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderTasks();
        }
        
        function addMember() {
            const name = document.getElementById('newMemberName').value.trim();
            const role = document.getElementById('newMemberRole').value.trim();
            if (name) {
                data.members.push({ id: Date.now(), name, role });
                document.getElementById('newMemberName').value = '';
                document.getElementById('newMemberRole').value = '';
                save();
            }
        }
        
        function addTask() {
            const title = document.getElementById('taskTitle').value.trim();
            const desc = document.getElementById('taskDesc').value.trim();
            const assignee = document.getElementById('taskAssignee').value;
            const deadline = document.getElementById('taskDeadline').value;
            const priority = document.getElementById('taskPriority').value;
            
            if (title) {
                data.tasks.push({
                    id: Date.now(), title, desc, assignee, deadline, priority,
                    completed: false, created: new Date().toISOString()
                });
                document.getElementById('taskTitle').value = '';
                document.getElementById('taskDesc').value = '';
                document.getElementById('taskDeadline').value = '';
                showPanel('tasks');
                save();
            }
        }
        
        function toggleTask(id) {
            const task = data.tasks.find(t => t.id === id);
            if (task) { task.completed = !task.completed; save(); }
        }
        
        function deleteTask(id) {
            if (confirm('Delete?')) { data.tasks = data.tasks.filter(t => t.id !== id); save(); }
        }
        
        function getStatus(task) {
            if (task.completed) return 'completed';
            if (task.deadline && new Date(task.deadline) < new Date()) return 'overdue';
            return 'pending';
        }
        
        function renderTasks() {
            const list = document.getElementById('taskList');
            let tasks = [...data.tasks];
            
            if (currentFilter === 'completed') tasks = tasks.filter(t => t.completed);
            else if (currentFilter === 'pending') tasks = tasks.filter(t => !t.completed);
            else if (currentFilter === 'overdue') tasks = tasks.filter(t => getStatus(t) === 'overdue');
            
            tasks.sort((a, b) => {
                if (a.completed !== b.completed) return a.completed ? 1 : -1;
                if (a.deadline && b.deadline) return new Date(a.deadline) - new Date(b.deadline);
                return 0;
            });
            
            if (!tasks.length) {
                list.innerHTML = '<div class="card" style="text-align:center;color:#aaa">No tasks</div>';
                return;
            }
            
            list.innerHTML = tasks.map(task => {
                const status = getStatus(task);
                return `
                    <div class="task" style="opacity:${task.completed?0.6:1}">
                        <div class="task-info">
                            <h4>${task.title} ${task.completed?'✅':''}</h4>
                            <p>${task.desc||''}</p>
                            <p>📋 ${task.assignee||'Unassigned'} | 📅 ${task.deadline||'No deadline'}</p>
                        </div>
                        <div class="task-meta">
                            <span class="tag ${status==='overdue'?'overdue':task.priority}">${task.priority}</span>
                            <button onclick="toggleTask(${task.id})">${task.completed?'↩':'✓'}</button>
                            <button class="delete-btn" onclick="deleteTask(${task.id})">✕</button>
                        </div>
                    </div>
                `;
            }).join('');
            
            document.getElementById('totalTasks').textContent = data.tasks.length;
            document.getElementById('completedTasks').textContent = data.tasks.filter(t=>t.completed).length;
            document.getElementById('overdueTasks').textContent = data.tasks.filter(t=>getStatus(t)==='overdue').length;
        }
        
        function renderTeam() {
            document.getElementById('teamList').innerHTML = data.members.map(m => 
                `<span class="user-chip">${m.name} (${m.role})</span>`
            ).join('') || '<p style="color:#aaa">No members</p>';
            document.getElementById('teamMembers').textContent = data.members.length;
            
            document.getElementById('taskAssignee').innerHTML = '<option value="">Assign to...</option>' + 
                data.members.map(m => `<option value="${m.name}">${m.name}</option>`).join('');
        }
        
        function updateShare() {
            document.getElementById('shareData').value = JSON.stringify(data);
        }
        
        function copyShare() {
            navigator.clipboard.writeText(JSON.stringify(data));
            alert('Copied! Send this to your team.');
        }
        
        function importData() {
            try {
                data = JSON.parse(document.getElementById('importText').value);
                save();
                document.getElementById('importData').style.display='none';
                alert('Imported!');
            } catch(e) { alert('Invalid code'); }
        }
        
        function render() { renderTasks(); renderTeam(); }
        render();
    </script>
</body>
</html>
